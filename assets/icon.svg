<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad1)"/>
  
  <!-- Checklist icon -->
  <g transform="translate(156, 128)">
    <!-- First checkbox -->
    <rect x="0" y="0" width="40" height="40" fill="none" stroke="white" stroke-width="4" rx="4"/>
    <path d="M 12 20 L 20 28 L 32 12" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- First line -->
    <rect x="60" y="8" width="140" height="8" fill="white" rx="4"/>
    
    <!-- Second checkbox -->
    <rect x="0" y="60" width="40" height="40" fill="none" stroke="white" stroke-width="4" rx="4"/>
    <path d="M 12 80 L 20 88 L 32 72" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Second line -->
    <rect x="60" y="68" width="140" height="8" fill="white" rx="4"/>
    
    <!-- Third checkbox (empty) -->
    <rect x="0" y="120" width="40" height="40" fill="none" stroke="white" stroke-width="4" rx="4"/>
    
    <!-- Third line -->
    <rect x="60" y="128" width="140" height="8" fill="white" rx="4"/>
  </g>
</svg>
